<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BRAVIA Controller</title>
  <style>
    :root {
      color-scheme: light;
      --text: #111827;
      --muted: #5f6673;
      --border: #dfe5ee;
      --accent: #007aff;
      --surface: #ffffff;
      --background: #f7f9fc;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--background);
      line-height: 1.65;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 22px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>BRAVIA Controller</h1>
      <p>BRAVIA Controller 是一款用于在本地网络中发现并控制 Sony BRAVIA 电视的 iOS 应用。</p>
      <a href="./privacy.html">查看隐私政策</a>
    </section>
  </main>
</body>
</html>
